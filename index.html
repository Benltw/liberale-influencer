<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liberale Influencer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
    }

    /* ── Gradient Banner ── */
    .gradient-bar {
      height: 6px;
      background: linear-gradient(90deg, #e5007d 0%, #9b1fa1 40%, #3b3fa5 75%, #1b3770 100%);
    }

    /* ── Hero / Page Title ── */
    .hero {
      background: #fff;
      padding: 40px 40px 28px;
      border-bottom: 1px solid #e0e4ed;
    }
    .hero h1 {
      font-size: 34px;
      font-weight: 800;
      color: #1b3770;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .hero p {
      font-size: 16px;
      color: #555;
      font-weight: 400;
    }
    .hero p em {
      color: #e5007d;
      font-style: normal;
      font-weight: 600;
    }

    /* ── Controls ── */
    .controls {
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      background: #f4f6f9;
    }
    .search-wrapper {
      position: relative;
      flex: 1;
      min-width: 240px;
      max-width: 380px;
    }
    .search-wrapper input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border: 1px solid #c8d0e0;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrapper input:focus { border-color: #1b3770; }
    .search-wrapper::before {
      content: "\1F50D";
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
    }
    .sort-label {
      font-size: 13px;
      color: #555;
      font-weight: 600;
      white-space: nowrap;
    }
    select {
      padding: 10px 14px;
      border: 1px solid #c8d0e0;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      color: #1a1a2e;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: #1b3770; }
    .count-badge {
      margin-left: auto;
      background: #1b3770;
      color: #fff;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    /* ── Table Container ── */
    .table-wrap {
      padding: 0 40px 50px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      font-size: 14px;
    }

    thead tr {
      background: #1b3770;
      color: #fff;
    }
    thead th {
      padding: 14px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    thead th:hover { background: #253e8a; }
    thead th.sorted-asc::after  { content: " \25B2"; font-size: 10px; opacity: 0.8; }
    thead th.sorted-desc::after { content: " \25BC"; font-size: 10px; opacity: 0.8; }

    tbody tr {
      border-bottom: 1px solid #eef0f6;
      transition: background 0.15s;
    }
    tbody tr:hover { background: #f0f4ff; }
    tbody tr:last-child { border-bottom: none; }

    td {
      padding: 14px 16px;
      vertical-align: middle;
    }

    /* Profile pic cell */
    .td-pic { width: 64px; padding: 10px 10px 10px 16px; }
    .profile-img {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #e5007d;
      display: block;
    }
    .profile-placeholder {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1b3770, #e5007d);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      border: 2px solid #e5007d;
    }

    /* Name/bio cell */
    .td-name { min-width: 180px; max-width: 260px; }
    .person-name {
      font-weight: 700;
      color: #1b3770;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .person-bio {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Instagram link */
    .ig-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: #c13584;
      font-weight: 600;
      font-size: 13px;
      background: #fdf0f7;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid #f0c0dd;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .ig-link:hover { background: #fad6ec; }
    .ig-icon { font-size: 15px; }

    /* Verified badge */
    .verified-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: #1b3770;
      background: #e8edf8;
      border-radius: 10px;
      padding: 2px 7px;
      margin-top: 6px;
      font-weight: 600;
    }

    /* Numbers */
    .num-cell { text-align: right; white-space: nowrap; }
    .num-big {
      font-size: 16px;
      font-weight: 800;
      color: #1b3770;
    }
    .num-label {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }

    /* Follower bar */
    .follower-bar-wrap { display: flex; align-items: center; gap: 10px; }
    .follower-bar-bg {
      flex: 1;
      height: 6px;
      background: #e8edf8;
      border-radius: 3px;
      min-width: 60px;
      max-width: 120px;
    }
    .follower-bar-fill {
      height: 6px;
      background: linear-gradient(90deg, #e5007d, #9b1fa1);
      border-radius: 3px;
      min-width: 4px;
    }

    /* Rank number */
    .rank-num {
      font-size: 13px;
      font-weight: 700;
      color: #bbb;
      width: 28px;
      text-align: center;
    }
    .rank-num.top3 { color: #e5007d; font-size: 15px; }

    /* No results */
    .no-results { text-align: center; padding: 48px 20px; color: #999; font-size: 15px; }

    /* Footer */
    .footer {
      background: #1b3770;
      color: #a0b4d6;
      text-align: center;
      padding: 18px;
      font-size: 12px;
      letter-spacing: 0.3px;
    }
    .footer strong { color: #fff; }
  </style>
</head>

<!-- Gradient Accent -->
<div class="gradient-bar"></div>

<!-- Hero Title -->
<section class="hero">
  <h1>Liberale Influencer</h1>
  <p>Wer ist Meinungsmacher/in? <em>In der liberalen Filterblase auf Instagram.</em></p>
</section>

<!-- Controls -->
<div class="controls">
  <div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Namen oder Biografie suchen …" oninput="filterTable()" />
  </div>
  <span class="sort-label">Sortieren nach:</span>
  <select id="sortSelect" onchange="sortTable()">
    <option value="followers-desc">Follower ↓</option>
    <option value="followers-asc">Follower ↑</option>
    <option value="posts-desc">Beiträge ↓</option>
    <option value="posts-asc">Beiträge ↑</option>
    <option value="name-asc">Name A–Z</option>
    <option value="name-desc">Name Z–A</option>
  </select>
  <div class="count-badge" id="countBadge">29 Influencer</div>
</div>

<!-- Table -->
<div class="table-wrap">
  <table id="influencerTable">
    <thead>
      <tr>
        <th style="width:40px;">#</th>
        <th style="width:64px;" class="no-sort">Foto</th>
        <th onclick="thSort('name')">Name &amp; Biografie</th>
        <th onclick="thSort('ig')">Instagram</th>
        <th onclick="thSort('followers')" class="num-cell sorted-desc">Follower</th>
        <th onclick="thSort('posts')" class="num-cell">Beiträge</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="no-results" id="noResults" style="display:none;">Keine Ergebnisse gefunden.</div>
</div>

  return n.toLocaleString('de-DE');
}

function initials(name) {
  return (name||'?').split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const noRes = document.getElementById('noResults');
  const badge = document.getElementById('countBadge');

  badge.textContent = currentData.length + ' Influencer';

  if (currentData.length === 0) {
    tbody.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  tbody.innerHTML = currentData.map((d, i) => {
    const barPct = Math.max(4, Math.round((d.followersCount / maxFollowers) * 100));
    const rank = i + 1;
    const rankCls = rank <= 3 ? 'rank-num top3' : 'rank-num';
    const verBadge = d.verified ? `<div class="verified-badge">✔ Verifiziert</div>` : '';

    return `<tr>
      <td><div class="${rankCls}">${rank}</div></td>
      <td class="td-pic">
        <img class="profile-img"
          src="${d.profilePicUrl}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
          alt="${d.fullName}" />
        <div class="profile-placeholder" style="display:none">${initials(d.fullName)}</div>
      </td>
      <td class="td-name">
        <div class="person-name">${d.fullName || '—'}</div>
        <div class="person-bio">${(d.biography||'').replace(/\n/g,' · ')}</div>
        ${verBadge}
      </td>
      <td>
        <a class="ig-link" href="https://instagram.com/${d.username}" target="_blank" rel="noopener">
          <span class="ig-icon">📸</span>@${d.username}
        </a>
      </td>
      <td class="num-cell">
        <div class="follower-bar-wrap">
          <div class="follower-bar-bg"><div class="follower-bar-fill" style="width:${barPct}%"></div></div>
          <div>
            <div class="num-big">${fmt(d.followersCount)}</div>
          </div>
        </div>
      </td>
      <td class="num-cell">
        <div class="num-big">${fmt(d.postsCount)}</div>
        <div class="num-label">Beiträge</div>
      </td>
    </tr>`;
  }).join('');
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  currentData = RAW.filter(d =>
    (d.fullName||'').toLowerCase().includes(q) ||
    (d.username||'').toLowerCase().includes(q) ||
    (d.biography||'').toLowerCase().includes(q)
  );
  applySortToCurrentData();
  renderTable();
}

function sortTable() {
  const val = document.getElementById('sortSelect').value;
  const [col, dir] = val.split('-');
  sortCol = col;
  sortDir = dir;
  applySortToCurrentData();
  renderTable();
}

function thSort(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = col === 'name' ? 'asc' : 'desc';
  }
  document.getElementById('sortSelect').value = col + '-' + sortDir;
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted-asc','sorted-desc');
  });
  applySortToCurrentData();
  renderTable();
}

function applySortToCurrentData() {
  currentData.sort((a,b) => {
    let va, vb;
    if (sortCol === 'followers') { va = a.followersCount; vb = b.followersCount; }
    else if (sortCol === 'posts') { va = a.postsCount;    vb = b.postsCount; }
    else { va = (a.fullName||'').toLowerCase(); vb = (b.fullName||'').toLowerCase(); }
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ?  1 : -1;
    return 0;
  });
}

// Initial render
applySortToCurrentData();
renderTable();
</script>
</body>
</html>
